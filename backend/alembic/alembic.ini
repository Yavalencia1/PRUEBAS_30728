# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the "create_date" field of a migration file
# string value is passed to the datetime.datetime constructor as the 'tz' argument
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field of a migration file
# (template used in file_template)
#
# Note that the length of the message is usually
# arbitrarily truncated on its way into the
# file template anyway, this is just backstop for common cases
# uncomment the line below to set an explicit length
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'upgrade' process
#
# dir_ignore_glob =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[sqlalchemy]
# the 'sqlalchemy.url' setting should be passed as an environment
# variable, represented here as "driver://user:password@localhost/dbname"
# note that the driver name comes before the ://
# a trailing colon is the port number (use psycopg2 on this project)
# for a successful connection a password is not required if using
# operating system authentication.  Operating systems can be
# configured such that a '" prompt lasts
# between login sessions.
#
# Format examples:
#   postgresql+asyncpg://routekids:routekids@localhost:5433/routekids

sqlalchemy.url = postgresql+asyncpg://routekids:routekids@localhost:5433/routekids

# Logging configuration
file_logging_queue_class =
