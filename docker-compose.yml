version: '3.9'

services:

  db:
    image: postgres:15-alpine
    container_name: routekids-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: routekids
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - routekids-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: routekids-api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:admin@db:5432/routekids
      SECRET_KEY: "tu_clave_secreta_muy_larga_y_aleatoria_cambiar_en_produccion_12345678"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      JWT_ISSUER: "routekids"
      JWT_AUDIENCE: "routekids-web"
      APP_NAME: "RouteKids"
      APP_ENV: development
      APP_DEBUG: "true"
      API_V1_PREFIX: "/api/v1"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5000,http://127.0.0.1:3000,http://localhost:9000"
      LOG_LEVEL: "info"
      PASSWORD_HASH_SCHEME: "bcrypt"
    ports:
      - "9000:8000"

    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - routekids-network

volumes:
  postgres_data:

networks:
  routekids-network:
    driver: bridge
